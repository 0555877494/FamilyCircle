name: family_circle
description: "A private, invitation-only family communication platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4
  
  # UI Components
  cached_network_image: ^3.4.1
  table_calendar: ^3.2.0
  photo_view: ^0.15.0
  
  # Media & Location
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # Security & Storage
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  permission_handler: ^11.3.1
  
  # Offline & Local Database
  sqflite: ^2.4.2
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.31
  
  # Networking (Offline/Direct)
  network_info_plus: ^6.1.4
  connectivity_plus: ^6.1.4
  
  # Bluetooth
  flutter_blue_plus: ^1.35.4
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  shared_preferences: ^2.5.0
  flutter_vibrate: ^1.4.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.15

dependency_overrides:
  sqlite3_flutter_libs: ^0.5.31

flutter:
  uses-material-design: true
  assets:
    - assets/images/